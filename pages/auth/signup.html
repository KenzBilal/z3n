<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - Z3n</title>
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/variables.css">
  <link rel="stylesheet" href="../../styles/base/typography.css">
  <link rel="stylesheet" href="../../styles/pages/auth.css">
</head>
<body>
  <div id="nav-container"></div>
  <main id="signup-main">
    <form id="signup-form">
      <div>
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" required autocomplete="username">
        <span id="username-status"></span>
      </div>
      <div>
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" required autocomplete="email">
      </div>
      <div>
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" required autocomplete="new-password">
      </div>
      <button type="submit" id="signup-submit">Sign Up</button>
      <button type="button" id="signup-google">Sign up with Google</button>
      <div id="signup-error" style="color:red;"></div>
    </form>
  </main>
  <div id="modals"></div>
  <div id="footer-container"></div>
  <script type="module" src="../../../js/pages/auth/signup.js"></script>
  <script>
    fetch('../../../components/nav.html').then(r=>r.text()).then(html=>document.getElementById('nav-container').innerHTML=html);
    fetch('../../../components/footer.html').then(r=>r.text()).then(html=>document.getElementById('footer-container').innerHTML=html);
  </script>
</body>
</html>
