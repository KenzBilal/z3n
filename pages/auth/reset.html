<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Z3N</title>
  <meta name="description" content="Reset your Z3N password">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/base/variables.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    .page-wrap{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}

    .left-panel{background:#000;border-right:1px solid #1A1A1A;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .left-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(123,97,255,0.06) 0%,transparent 50%);pointer-events:none}
    .left-logo{font-size:20px;font-weight:700;letter-spacing:-0.05em;color:#fff;text-decoration:none;font-family:'JetBrains Mono',monospace;position:relative}
    .left-content{padding:40px 0;position:relative}
    .left-label{font-size:11px;color:#6E6E6E;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:24px;font-weight:600}
    .left-headline{font-size:44px;font-weight:700;letter-spacing:-0.03em;line-height:1.08;margin-bottom:20px}
    .left-headline em{font-style:normal;color:#7B61FF}
    .left-sub{font-size:15px;color:#6E6E6E;line-height:1.7;max-width:340px}

    .right-panel{background:#000;padding:48px;display:flex;flex-direction:column;justify-content:center;align-items:center}
    .form-wrap{width:100%;max-width:400px}
    .form-title{font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px}
    .form-sub{font-size:14px;color:#6E6E6E;margin-bottom:36px;line-height:1.6}
    .form-sub a{color:#7B61FF;text-decoration:none;font-weight:500}
    .form-sub a:hover{text-decoration:underline}

    .error-msg{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:8px;padding:12px 16px;font-size:13px;color:#EF4444;margin-bottom:20px;display:none;line-height:1.5}
    .error-msg.show{display:block}
    .success-msg{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);border-radius:8px;padding:16px;font-size:14px;color:#22C55E;display:none;line-height:1.6;text-align:center}
    .success-msg.show{display:block}

    .field{margin-bottom:20px}
    .field-label{font-size:13px;color:#B3B3B3;margin-bottom:8px;display:block}
    .field-input{width:100%;padding:12px 16px;background:#0A0A0A;border:1px solid #1A1A1A;border-radius:8px;color:#fff;font-size:14px;outline:none;transition:all 0.2s;font-family:'Inter',system-ui,sans-serif}
    .field-input:focus{border-color:rgba(123,97,255,0.4);background:#0D0B1A;box-shadow:0 0 0 3px rgba(123,97,255,0.08)}
    .field-input::placeholder{color:#4A4A4A}
    .field-input.field-error{border-color:rgba(239,68,68,0.4)}

    .btn-submit{width:100%;padding:12px;background:#7B61FF;color:#fff;font-size:15px;font-weight:600;border-radius:8px;cursor:pointer;border:none;margin-top:8px;transition:all 0.2s;font-family:'Inter',system-ui,sans-serif}
    .btn-submit:hover{background:#6B51EF;transform:translateY(-1px);box-shadow:0 8px 24px rgba(123,97,255,0.25)}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#6E6E6E;text-decoration:none;margin-top:24px;transition:color 0.15s}
    .back-link:hover{color:#B3B3B3}

    .right-footer{margin-top:40px;text-align:center}
    .right-footer p{font-size:12px;color:#333}

    @media(max-width:768px){
      .page-wrap{grid-template-columns:1fr}
      .left-panel{display:none}
      .right-panel{padding:32px 24px;min-height:100vh}
      .form-wrap{max-width:100%}
    }
  </style>
</head>
<body>

<div class="page-wrap">

  <div class="left-panel">
    <a href="/pages/index.html" class="left-logo">Z3N</a>

    <div class="left-content">
      <div class="left-label">Password reset</div>
      <div class="left-headline">
        Back in<br>your <em>account</em>
      </div>
      <p class="left-sub">
        We'll send you a secure link to reset your password. No problem.
      </p>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-wrap">

      <h1 class="form-title">Forgot your password?</h1>
      <p class="form-sub">
        Enter your email and we'll send you a reset link.
      </p>

      <div class="error-msg" id="reset-error"></div>

      <div id="reset-form-section">
        <div class="field">
          <label class="field-label" for="reset-email">Email</label>
          <input type="email" class="field-input" id="reset-email" placeholder="you@example.com" autocomplete="email" autofocus>
        </div>

        <button class="btn-submit" id="reset-submit">Send reset link</button>
      </div>

      <div class="success-msg" id="reset-success">
        Check your email for a password reset link. It may take a minute to arrive.
      </div>

      <a href="/pages/auth/login.html" class="back-link">← Back to sign in</a>

    </div>

    <div class="right-footer">
      <p>&copy; 2025 Z3N Marketplace</p>
    </div>
  </div>

</div>

<script type="module" src="../../js/pages/auth/reset.js"></script>
</body>
</html>
