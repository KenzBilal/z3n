<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Z3n</title>
  <link rel="stylesheet" href="../../styles/base/reset.css">
  <link rel="stylesheet" href="../../styles/base/variables.css">
  <link rel="stylesheet" href="../../styles/base/typography.css">
  <link rel="stylesheet" href="../../styles/pages/auth.css">
</head>
<body>
  <div id="nav-container"></div>
  <main id="login-main">
    <form id="login-form">
      <div>
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="username">
      </div>
      <div>
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" id="login-submit">Sign In</button>
      <button type="button" id="login-google">Sign in with Google</button>
      <div id="login-error" style="color:red;"></div>
    </form>
  </main>
  <div id="modals"></div>
  <div id="footer-container"></div>
  <script type="module" src="../../../js/pages/auth/login.js"></script>
  <script>
    fetch('../../../components/nav.html').then(r=>r.text()).then(html=>document.getElementById('nav-container').innerHTML=html);
    fetch('../../../components/footer.html').then(r=>r.text()).then(html=>document.getElementById('footer-container').innerHTML=html);
  </script>
</body>
</html>
