<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z3N — The AI Marketplace</title>
  <meta name="description" content="Z3N is the premium marketplace for AI prompts, tools, agents, Chrome extensions and workflows">
  <link rel="stylesheet" href="../styles/base/reset.css">
  <link rel="stylesheet" href="../styles/base/variables.css">
  <link rel="stylesheet" href="../styles/base/typography.css">
  <link rel="stylesheet" href="../styles/pages/landing.css">
</head>
<body>
  <div id="nav-container"></div>
  
  <main id="landing-main">
    <section class="bento-hero-grid">
      <div class="bento-widget hero-widget">
        <h1 id="hero-title">The AI Marketplace.</h1>
        <p id="hero-subtitle">Discover, buy, and sell next-generation prompts, tools, agents, and workflows.</p>
        <div class="hero-actions">
          <a href="/pages/marketplace.html" class="btn-primary pill">Browse Marketplace</a>
          <a href="/pages/auth/signup.html" class="btn-secondary pill">Start Selling</a>
        </div>
      </div>

      <div class="bento-widget stat-widget">
        <span class="stat-value" id="stat-products">-</span>
        <span class="stat-label">Products</span>
      </div>
      <div class="bento-widget stat-widget dark-stat">
        <span class="stat-value" id="stat-sellers">-</span>
        <span class="stat-label">Sellers</span>
      </div>
      <div class="bento-widget stat-widget">
        <span class="stat-value" id="stat-sales">-</span>
        <span class="stat-label">Total Sales</span>
      </div>
    </section>

    <section id="categories" class="section-container">
      <div class="section-header">
        <h2>Categories</h2>
        <a href="/pages/marketplace.html" class="view-all">View All →</a>
      </div>
      <div id="categories-grid" class="pill-grid"></div>
    </section>

    <section id="featured" class="section-container">
      <div class="section-header">
        <h2>Featured Products</h2>
      </div>
      <div id="featured-grid" class="product-bento-grid"></div>
    </section>
  </main>

  <div id="modals"></div>
  <div id="footer-container"></div>
  
  <script type="module" src="../js/pages/landing.js"></script>
  <script type="module" src="../js/components/nav.js"></script>
  <script>
    fetch('../components/nav.html').then(r=>r.text()).then(html=>document.getElementById('nav-container').innerHTML=html);
    fetch('../components/footer.html').then(r=>r.text()).then(html=>document.getElementById('footer-container').innerHTML=html);
  </script>
</body>
</html>
