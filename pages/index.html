<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z3n Marketplace</title>
  <!-- Base CSS imports -->
  <link rel="stylesheet" href="../styles/base/reset.css">
  <link rel="stylesheet" href="../styles/base/variables.css">
  <link rel="stylesheet" href="../styles/base/typography.css">
  <link rel="stylesheet" href="../styles/pages/landing.css">
</head>
<body>
  <!-- Navigation -->
  <div id="nav-container"></div>
  <!-- Main Content -->
  <main id="landing-main">
    <section id="hero">
      <h1 id="hero-title">The AI Marketplace</h1>
      <p id="hero-subtitle">Buy and sell prompts, tools, agents, extensions and workflows</p>
      <a href="/pages/marketplace.html">Browse Marketplace</a>
      <a href="/pages/auth/signup.html">Start Selling</a>
    </section>
    <section id="stats">
      <div>
        <span id="stat-products">-</span>
        <span>Products</span>
      </div>
      <div>
        <span id="stat-sellers">-</span>
        <span>Sellers</span>
      </div>
      <div>
        <span id="stat-sales">-</span>
        <span>Sales</span>
      </div>
    </section>
    <section id="categories">
      <h2>Browse by Category</h2>
      <div id="categories-grid">
        <!-- loaded by landing.js -->
      </div>
    </section>
    <section id="featured">
      <h2>Featured Products</h2>
      <div id="featured-grid">
        <!-- loaded by landing.js -->
      </div>
    </section>
  </main>
  <!-- Modals -->
  <div id="modals"></div>
  <!-- Footer -->
  <div id="footer-container"></div>
  <script type="module" src="../js/pages/landing.js"></script>
  <script>
    // Load nav and footer components
    fetch('../components/nav.html').then(r=>r.text()).then(html=>document.getElementById('nav-container').innerHTML=html);
    fetch('../components/footer.html').then(r=>r.text()).then(html=>document.getElementById('footer-container').innerHTML=html);
  </script>
</body>
</html>
