<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found — Z3N</title>
  <link rel="stylesheet" href="../styles/base/reset.css">
  <link rel="stylesheet" href="../styles/base/variables.css">
  <link rel="stylesheet" href="../styles/base/typography.css">
  <link rel="stylesheet" href="../styles/pages/landing.css">
</head>
<body>
  <div id="nav-container"></div>
  <main id="error-main" style="text-align:center;padding:80px 20px;">
    <h1 style="font-size:4rem;margin-bottom:16px;">404</h1>
    <h2 style="margin-bottom:16px;">Page Not Found</h2>
    <p style="margin-bottom:24px;opacity:0.7;">The page you're looking for doesn't exist.</p>
    <a href="/pages/index.html" class="btn-primary" style="display:inline-block;padding:12px 24px;background:#7B61FF;color:#fff;text-decoration:none;border-radius:6px;">Go to Homepage</a>
  </main>
  <div id="modals"></div>
  <div id="footer-container"></div>
  <script type="module" src="../js/components/nav.js"></script>
  <script>
    fetch('../components/nav.html').then(r=>r.text()).then(html=>document.getElementById('nav-container').innerHTML=html);
    fetch('../components/footer.html').then(r=>r.text()).then(html=>document.getElementById('footer-container').innerHTML=html);
  </script>
</body>
</html>
